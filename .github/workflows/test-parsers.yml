name: YAML Parser Differential Tests

on:
  push:
    branches: [main]

jobs:
  test-all-parsers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: python3 scripts/run-tests.py

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: results
          path: results.json
