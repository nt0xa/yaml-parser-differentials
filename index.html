<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YAML Parser Differentials</title>
<style>
:root {
  --color-bg: #0c0c0e;
  --color-white: 255 255 255;
  --color-orange: 251 146 60;
  --color-red: 239 68 68;
  --color-green: 34 197 94;
  --color-blue: 96 165 250;
  --color-surface: rgb(var(--color-white) / 0.04);
  --color-border: rgb(var(--color-white) / 0.1);
  --color-text: #d4d4d8;
  --color-text-bright: #fafafa;
  --color-text-dim: rgb(var(--color-white) / 0.8);
  --color-text-dimmer: rgb(var(--color-white) / 0.5);
  --mono: ui-monospace, "Cascadia Code", "Cascadia Mono", "Segoe UI Mono", "SF Mono", "Roboto Mono", Menlo, Consolas, monospace;
  --radius: 6px;
  --fs-title: 24px;
  --fs-small: 15px;
  --fs-xs: 13px;
}

body {
  margin: 0;
  font-family: var(--mono);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

a { color: #93c5fd; }
a:visited { color: #f0abfc; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 24px 60px;
}

h1 {
  margin: 0;
  font-size: var(--fs-title);
  font-weight: 700;
  color: var(--color-text-bright);
}

.subtitle {
  margin-top: 6px;
  font-size: var(--fs-small);
  color: var(--color-text-dim);
  margin-bottom: 24px;
}

.pair-table {
  border-collapse: collapse;
  width: 100%;
  font-size: var(--fs-small);
}

.pair-table th {
  text-align: left;
  font-weight: 600;
  color: var(--color-text-dim);
  padding: 6px 10px;
  border-bottom: 1px solid var(--color-border);
}

.pair-table td {
  padding: 5px 10px;
  border-bottom: 1px solid rgb(var(--color-white) / 0.04);
  vertical-align: middle;
}

.pair-table td, .pair-table th { white-space: nowrap; }

.pair-table tr:hover td { background: rgb(var(--color-white) / 0.06); }
.pair-table tr.active td { background: rgb(var(--color-blue) / 0.1); }

td.test-name {
  color: var(--color-text-dim);
  font-size: var(--fs-xs);
  min-width: 200px;
}

td.test-name .num { color: var(--color-text-dimmer); }

.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 3px;
  font-size: var(--fs-xs);
  font-weight: 500;
}

.badge-absent { color: var(--color-text-dimmer); }

.badge-parse-error {
  background: rgb(var(--color-red) / 0.15);
  color: rgb(var(--color-red));
}

.badge-value { color: var(--color-text-bright); }

.badge-diff {
  background: rgb(var(--color-green) / 0.1);
  color: rgb(var(--color-green));
}

.pair-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.pair-controls label { font-size: var(--fs-small); color: var(--color-text-dim); }

.pair-controls select {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  color: var(--color-text-bright);
  font-family: var(--mono);
  font-size: var(--fs-small);
  padding: 5px 10px;
  border-radius: var(--radius);
  outline: none;
  cursor: pointer;
}

.pair-controls select:focus,
.pair-controls select:hover {
  border-color: rgb(var(--color-white) / 0.2);
}

.vs-sep {
  color: var(--color-text-dimmer);
  font-size: var(--fs-small);
}

.pair-count {
  font-size: var(--fs-xs);
  color: rgb(var(--color-orange));
  margin-left: auto;
}

.pair-table th.parser-name { color: var(--color-blue); }

.no-diffs {
  text-align: center;
  padding: 40px;
  color: var(--color-text-dimmer);
  font-size: var(--fs-xs);
}

.state-msg {
  text-align: center;
  padding: 60px 20px;
  font-size: var(--fs-xs);
  color: var(--color-text-dim);
}

.state-msg .err { color: rgb(var(--color-red)); }

.test-preview {
  margin-top: 18px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-surface);
  overflow: hidden;
}

.test-preview-head {
  padding: 8px 12px;
  border-bottom: 1px solid var(--color-border);
  color: var(--color-text-dim);
  font-size: var(--fs-xs);
}

.test-preview pre {
  margin: 0;
  padding: 12px;
  max-height: 280px;
  overflow: auto;
  font-size: var(--fs-small);
  color: var(--color-text-bright);
}

.yaml-comment { color: var(--color-text-dimmer); }
</style>
</head>
<body>
<div class="container">
  <h1>YAML Parser Differentials</h1>
  <p class="subtitle">How different YAML parsers interpret the same input. Based on <a href="https://0day.click/parser-diff-talk-oc25/">Joern Schneeweisz</a> and <a href="https://gist.github.com/taramtrampam/fca4e599992909b48a3ba1ce69e215a2">taramtrampam</a> research.</p>

  <div class="pair-controls">
    <label for="pair-a">Parser A</label>
    <select id="pair-a" onchange="renderPair()"></select>
    <span class="vs-sep">vs</span>
    <label for="pair-b">Parser B</label>
    <select id="pair-b" onchange="renderPair()"></select>
    <span class="pair-count" id="pair-count"></span>
    <label><input type="checkbox" id="show-all" onchange="renderPair()"> show all</label>
  </div>
  <div id="pair-content"><div class="state-msg">Loading results...</div></div>
  <div class="test-preview">
    <div class="test-preview-head" id="test-preview-title">Hover a row to preview the YAML file.</div>
    <pre id="test-preview-content"></pre>
  </div>
</div>

<template id="tpl-badge-absent"><span class="badge badge-absent">absent</span></template>
<template id="tpl-badge-parse-error"><span class="badge badge-parse-error"></span></template>
<template id="tpl-badge-value"><span class="badge badge-value"></span></template>
<template id="tpl-badge-diff"><span class="badge badge-diff"></span></template>
<template id="tpl-pair-table">
  <table class="pair-table">
    <thead><tr>
      <th>test</th>
      <th class="parser-name"></th>
      <th class="parser-name"></th>
    </tr></thead>
    <tbody></tbody>
  </table>
</template>
<template id="tpl-pair-row">
  <tr>
    <td class="test-name"></td>
    <td></td>
    <td></td>
  </tr>
</template>
<template id="tpl-yaml-comment"><span class="yaml-comment"></span></template>
<template id="tpl-no-diffs"><div class="no-diffs"></div></template>
<template id="tpl-state-err"><div class="state-msg"><span class="err"></span><br><br>Serve this file from a local HTTP server or GitHub Pages.</div></template>

<script>
let results = null;
let parsers = null;
const testCache = {};
let previewReqId = 0;
let activeRow = null;

function tpl(id) {
  return document.getElementById(id).content.cloneNode(true);
}

async function loadData() {
  try {
    const [rRes, pRes] = await Promise.all([
      fetch('results.json'),
      fetch('parsers.json'),
    ]);
    if (!rRes.ok) throw new Error(`results.json: ${rRes.status} ${rRes.statusText}`);
    if (!pRes.ok) throw new Error(`parsers.json: ${pRes.status} ${pRes.statusText}`);
    results = await rRes.json();
    parsers = await pRes.json();
  } catch (e) {
    const frag = tpl('tpl-state-err');
    frag.querySelector('.err').textContent = e.message;
    document.getElementById('pair-content').replaceChildren(frag);
    return;
  }
  populatePairSelects();
  renderPair();
}

function entryKey(entry) {
  if (!entry) return '';
  if (entry.error !== undefined) return 'error';
  return entry.value ?? '';
}

function badge(entry, isDiff) {
  if (!entry || entry.value === 'absent') return tpl('tpl-badge-absent');
  if (entry.error !== undefined) {
    const frag = tpl('tpl-badge-parse-error');
    const span = frag.querySelector('span');
    span.title = entry.error;
    span.textContent = 'error';
    return frag;
  }
  const frag = tpl(isDiff ? 'tpl-badge-diff' : 'tpl-badge-value');
  frag.querySelector('span').textContent = String(entry.value);
  return frag;
}

function testLabel(name) {
  const m = name.match(/^(\d+)-(.+)\.yaml$/);
  if (m) {
    const frag = document.createDocumentFragment();
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = m[1];
    frag.append(num, '  ' + m[2].replace(/-/g, ' '));
    return frag;
  }
  return document.createTextNode(name.replace(/\.yaml$/, ''));
}

function populatePairSelects() {
  const parserIds = Object.keys(parsers);
  const selectA = document.getElementById('pair-a');
  const selectB = document.getElementById('pair-b');
  for (const id of parserIds) {
    const opt = new Option(parsers[id].name, id);
    selectA.add(opt.cloneNode(true));
    selectB.add(opt);
  }
  if (parserIds.length > 1) selectB.selectedIndex = 1;
}

function renderPair() {
  if (!results || !parsers) return;
  const a = document.getElementById('pair-a').value;
  const b = document.getElementById('pair-b').value;
  const container = document.getElementById('pair-content');

  const showAll = document.getElementById('show-all').checked;
  const testFiles = Object.keys(results).sort();

  const isDiffRow = tf => {
    const row = results[tf] ?? {};
    const ea = row[a], eb = row[b];
    if ((ea?.error !== undefined) || (eb?.error !== undefined)) return false;
    return entryKey(ea) !== entryKey(eb);
  };

  const rows = showAll ? testFiles : testFiles.filter(isDiffRow);
  const diffCount = showAll ? testFiles.filter(isDiffRow).length : rows.length;

  document.getElementById('pair-count').textContent =
    showAll ? `${diffCount} / ${rows.length} differ` :
    diffCount ? `${diffCount} difference${diffCount !== 1 ? 's' : ''}` : '';

  if (a === b) {
    const frag = tpl('tpl-no-diffs');
    frag.querySelector('div').textContent = 'Select two different parsers to compare.';
    container.replaceChildren(frag);
    return;
  }

  if (rows.length === 0) {
    const frag = tpl('tpl-no-diffs');
    frag.querySelector('div').textContent = 'No differences between these two parsers.';
    container.replaceChildren(frag);
    return;
  }

  const tableFrag = tpl('tpl-pair-table');
  const [thA, thB] = tableFrag.querySelectorAll('th.parser-name');
  thA.textContent = parsers[a].name;
  thB.textContent = parsers[b].name;

  const tbody = tableFrag.querySelector('tbody');
  for (const tf of rows) {
    const row = results[tf] ?? {};
    const isDiff = entryKey(row[a]) !== entryKey(row[b]);
    const rowFrag = tpl('tpl-pair-row');
    const tr = rowFrag.querySelector('tr');
    const [tdName, tdA, tdB] = rowFrag.querySelectorAll('td');
    tdName.appendChild(testLabel(tf));
    tdA.appendChild(badge(row[a], isDiff));
    tdB.appendChild(badge(row[b], isDiff));
    tr.addEventListener('click', () => {
      if (activeRow === tr) {
        activeRow.classList.remove('active');
        activeRow = null;
        clearTestPreview();
      } else {
        if (activeRow) activeRow.classList.remove('active');
        activeRow = tr;
        tr.classList.add('active');
        showTestPreview(tf);
      }
    });
    tbody.appendChild(rowFrag);
  }

  activeRow = null;
  clearTestPreview();
  container.replaceChildren(tableFrag);
}

function clearTestPreview() {
  document.getElementById('test-preview-title').textContent = 'Hover a row to preview the YAML file.';
  document.getElementById('test-preview-content').replaceChildren();
}

function renderYamlPreview(text) {
  const frag = document.createDocumentFragment();
  const lines = text.split('\n');
  for (let i = 0; i < lines.length; i++) {
    if (i > 0) frag.appendChild(document.createTextNode('\n'));
    const line = lines[i];
    if (/^\s*#/.test(line)) {
      const f = tpl('tpl-yaml-comment');
      f.querySelector('span').textContent = line;
      frag.appendChild(f);
    } else {
      frag.appendChild(document.createTextNode(line));
    }
  }
  return frag;
}

async function showTestPreview(tf) {
  const reqId = ++previewReqId;
  const title = document.getElementById('test-preview-title');
  const content = document.getElementById('test-preview-content');
  title.textContent = tf;
  if (testCache[tf] !== undefined) {
    content.replaceChildren(renderYamlPreview(testCache[tf]));
    return;
  }
  content.textContent = 'Loading...';
  try {
    const res = await fetch(`tests/${tf}`);
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const text = await res.text();
    testCache[tf] = text;
    if (reqId !== previewReqId) return;
    content.replaceChildren(renderYamlPreview(text));
  } catch (e) {
    if (reqId !== previewReqId) return;
    content.textContent = `Failed to load tests/${tf}: ${e.message}`;
  }
}

loadData();
</script>
</body>
</html>
