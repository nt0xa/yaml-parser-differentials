<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAML Parser Differentials</title>
  <link rel="stylesheet" href="style.css?v={VERSION}">
</head>
<body>
  <main>
    <header>
      <h1>YAML Parser Differentials</h1>
      <p>
          A comparison of how different YAML parsers interpret the same input.
          Based on <a href="https://0day.click/parser-diff-talk-oc25/">Joern Schneeweisz</a> and
          <a href="https://gist.github.com/taramtrampam/fca4e599992909b48a3ba1ce69e215a2">taramtrampam</a> research.
      </p>
    </header>

    <form id="controls">
      <fieldset>
        <legend>Compare parsers</legend>

        <label for="parser-a">Parser A</label>
        <select id="parser-a"></select>

        <label for="parser-b">Parser B</label>
        <select id="parser-b"></select>

      </fieldset>
    </form>

    <section>
      <p id="error"></p>
    </section>

    <section id="content">
      <form id="cases">
        <div id="filters">
          <span id="diff-count"></span>
          <label for="show-all">
            <input type="checkbox" id="show-all">
            Show all
          </label>
        </div>
        <select id="tests" size="2"></select>
      </form>
      <div id="previews">
        <div class="preview">
          <div class="title" id="preview-a-title">Parser A</div>
          <pre class="content" id="preview-a-content"></pre>
        </div>
        <div class="preview">
          <div class="title" id="preview-b-title">Parser B</div>
          <pre class="content" id="preview-b-content"></pre>
        </div>
      </div>
    </section>
  </main>
  <script src="index.js?v={VERSION}"></script>
</body>
</html>
